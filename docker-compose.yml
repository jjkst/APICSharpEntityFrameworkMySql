services:
  # Runs pending EF Core migrations, then exits
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: ruku_migrate
    env_file: ./.env.docker
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - ruku-network

  # .NET 8 API (Alpine)
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: ruku_api
    restart: unless-stopped
    env_file: ./.env.docker
    environment:
      - ASPNET_URLS=http://+:80
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    mem_limit: 200m
    volumes:
      - ./RukuServiceApi/logs:/app/logs
      - ./RukuServiceApi/uploads:/app/uploads
    networks:
      - ruku-network

  # MariaDB 10.11 (MySQL-compatible, much lighter)
  db:
    image: mariadb:10.11
    container_name: ruku_db
    restart: unless-stopped
    env_file: ./.env.docker
    mem_limit: 256m
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mariadb/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ruku-network

  # Single Nginx — serves Angular static files + proxies API
  web:
    build:
      context: ../jk-portfolio
      dockerfile: Dockerfile
    container_name: ruku_web
    restart: unless-stopped
    mem_limit: 64m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - api
    networks:
      - ruku-network

volumes:
  mysql-data:
  certbot-conf:
  certbot-www:

networks:
  ruku-network:
    driver: bridge
