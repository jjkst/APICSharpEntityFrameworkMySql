services:
  ruku-service-api-dev:
    build: .
    ports:
      - "5002:80"
    env_file:
      - .env.local
      - .env.docker
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:80
    depends_on:
      mysql-dev:
        condition: service_healthy
    volumes:
      - ./logs:/var/log/ruku-service-api
      - ./uploads:/app/uploads
    restart: unless-stopped

  mysql-dev:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dev-password}
      MYSQL_DATABASE: RukuITServicesTest
    ports:
      - "3307:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./sql-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD:-dev-password} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_dev_data:
