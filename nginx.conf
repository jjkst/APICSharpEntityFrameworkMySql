worker_processes auto;

events { }

http {
    # Redirect all HTTP traffic to HTTPS for security
    server {
        listen 80;
        server_name your-domain.com www.your-domain.com; # <-- CHANGE THIS

        # Location for Let's Encrypt to perform ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # For all other requests, redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name your-domain.com www.your-domain.com; # <-- CHANGE THIS

        # SSL Certificate paths (to be generated by Certbot)
        ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem; # <-- CHANGE THIS
        ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem; # <-- CHANGE THIS
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # Reverse proxy for the API
        location /api/ {
            proxy_pass http://api; # 'api' is the service name from docker-compose
        }

        # Reverse proxy for the Angular frontend
        location / {
            proxy_pass http://frontend; # 'frontend' is the service name from docker-compose
        }
    }
}